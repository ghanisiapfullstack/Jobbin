services:
  # Backend — Go API
  - type: web
    name: jobbin-backend
    runtime: go
    rootDir: .
    buildCommand: go build -o main .
    startCommand: ./main
    envVars:
      - key: APP_NAME
        value: Jobbin
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 3000
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: warning
      - key: APP_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DB_CONNECTION
        value: postgres
      - key: DB_HOST
        fromDatabase:
          name: jobbin-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: jobbin-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: jobbin-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: jobbin-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: jobbin-db
          property: password
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM_ADDRESS
        value: onboarding@resend.dev
      - key: MAIL_FROM_NAME
        value: Jobbin
      - key: FRONTEND_URL
        sync: false

  # Frontend — Static site
  - type: web
    name: jobbin-frontend
    runtime: static
    rootDir: ../jobbin-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: jobbin-db
    plan: free
    databaseName: jobbin
