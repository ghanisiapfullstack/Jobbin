services:
  postgres:
    image: postgres:16-alpine
    container_name: jobbin_postgres
    environment:
      POSTGRES_DB: jobbin
      POSTGRES_USER: jobbin
      POSTGRES_PASSWORD: jobbin_secret
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "5433:5432"
    volumes:
      - jobbin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobbin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  jobbin_postgres_data:
