name: Trigger auto deployment for jobbin-backend

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/jobbin-backend-AutoDeployTrigger-a35df8ee-5c7b-431f-b4ea-51aad6b563ee.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.JOBBINBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.JOBBINBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.JOBBINBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile
          registryUrl: jobbinregistry.azurecr.io
          registryUsername: ${{ secrets.JOBBINBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.JOBBINBACKEND_REGISTRY_PASSWORD }}
          containerAppName: jobbin-backend
          resourceGroup: jobbin-rg
          imageToBuild: jobbinregistry.azurecr.io/jobbin-backend:${{ github.sha }}
